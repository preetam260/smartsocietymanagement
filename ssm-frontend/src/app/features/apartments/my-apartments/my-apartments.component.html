<div class="page-header"><h1>My Apartments</h1></div>
    @if (loading()) { <app-loading-spinner /> }
    @else if (!apartments().length) { <app-empty-state message="No apartments assigned to you" /> }
    @else {
      <div class="card-grid">
        @for (apt of apartments(); track apt.id) {
          <div class="card"><div class="card-body">
            <h3>{{ apt.block }}-{{ apt.number }}</h3>
            <p class="text-muted text-sm">Floor {{ apt.floor }}</p>
            <p class="text-sm">Owner: {{ apt.ownerName }}</p>
          </div></div>
        }
      </div>
    }
