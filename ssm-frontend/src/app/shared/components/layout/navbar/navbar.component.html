<nav class="navbar">
      <div class="navbar-left">
        <button class="hamburger" (click)="toggleSidebar()">☰</button>
        <span class="brand">SmartSociety</span>
      </div>
      <div class="navbar-right">
        <a routerLink="/notifications" class="notification-bell" title="Notifications">
          🔔
          @if (unreadCount() > 0) {
            <span class="badge-count">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
          }
        </a>
        <div class="user-info">
          <span class="user-name">{{ auth.currentUser()?.name }}</span>
          <span class="user-role">{{ auth.currentUser()?.role }}</span>
        </div>
        <button class="btn btn-outline btn-sm" (click)="auth.logout()">Logout</button>
      </div>
    </nav>
